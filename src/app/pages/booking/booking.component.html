<div class="page-card">
  <h2>Book the car</h2>
  <p class="small-text">Submit the day, reason, and expected odometer reading. Admin approval is required.</p>

  <form (ngSubmit)="submitBooking()">
    <label>
      Booking date
      <input type="date" [(ngModel)]="bookingDate" name="bookingDate" required />
    </label>
    <label>
      Reason
      <textarea [(ngModel)]="reason" name="reason" required></textarea>
    </label>
    <label>
      Start time
      <input type="time" [(ngModel)]="startTime" name="startTime" [disabled]="allDay" required />
    </label>
    <label>
      End time
      <input type="time" [(ngModel)]="endTime" name="endTime" [disabled]="allDay" required />
    </label>
    <label>
      <input type="checkbox" [(ngModel)]="allDay" name="allDay" /> Whole day booking
    </label>
    <label>
      Expected starting KM
      <input type="number" [(ngModel)]="expectedStartKm" name="expectedStartKm" min="0" required />
    </label>
    <button type="submit" class="primary">Submit booking request</button>
  </form>

  <div *ngIf="error" class="error-message">{{ error }}</div>
  <div *ngIf="message" class="success-message">{{ message }}</div>
</div>
