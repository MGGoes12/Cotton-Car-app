<div class="page-card">
  <div class="card-head">
    <span class="head-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M12 14v4M10 16h4"/></svg>
    </span>
    <div>
      <h2>Book the car</h2>
      <p class="small-text">Pick a day, trip type, and expected odometer reading. Admin approval is required.</p>
    </div>
  </div>

  <form (ngSubmit)="submitBooking()">
    <label>
      Booking date
      <input type="date" [(ngModel)]="bookingDate" name="bookingDate" [min]="minBookingDate" (ngModelChange)="refreshOverlapData()" required />
    </label>

    <fieldset class="reason-fieldset">
      <legend>Trip type</legend>
      <label *ngFor="let option of bookingReasons" class="reason-option">
        <input type="radio" [(ngModel)]="reason" name="reason" [value]="option" required />
        <span>{{ option }}</span>
      </label>
    </fieldset>

    <label class="toggle-row" [class.on]="allDay">
      <input type="checkbox" [(ngModel)]="allDay" name="allDay" (ngModelChange)="onAllDayChange()" />
      <span>
        <strong>Whole day booking</strong>
        <span class="small-text">Reserve the car for the entire day</span>
      </span>
    </label>

    <label class="toggle-row" [class.on]="overnight" *ngIf="!allDay">
      <input type="checkbox" [(ngModel)]="overnight" name="overnight" (ngModelChange)="onOvernightChange()" />
      <span>
        <strong>Overnight trip</strong>
        <span class="small-text">You return the next morning (return time is on the following day)</span>
      </span>
    </label>

    <div class="field-row field-row--times" *ngIf="!allDay">
      <label class="time-field">
        Leaving time
        <app-time-picker
          [value]="startTime"
          [minuteStep]="timeMinuteStep"
          (valueChange)="onStartTimeChange($event)"
        ></app-time-picker>
      </label>
      <label class="time-field">
        {{ overnight ? 'Expected return time (next day)' : 'Expected return time' }}
        <app-time-picker
          [value]="endTime"
          [minTime]="minEndTime"
          [minuteStep]="timeMinuteStep"
          (valueChange)="onEndTimeChange($event)"
        ></app-time-picker>
      </label>
    </div>
    <p *ngIf="overnight && !allDay" class="time-range-hint overnight-hint">Leaving {{ startTime }} on {{ bookingDate }} → returning {{ endTime }} the next day.</p>
    <p *ngIf="timeRangeError" class="time-range-hint" role="alert">{{ timeRangeError }}</p>

    <label>
      Expected starting KM
      <input type="number" [(ngModel)]="expectedStartKm" name="expectedStartKm" min="0" placeholder="Odometer reading" required />
    </label>
    <button type="submit" class="primary">Submit booking request</button>
  </form>

  <div *ngIf="error" class="error-message">{{ error }}</div>
  <div *ngIf="message" class="success-message">{{ message }}</div>
</div>
