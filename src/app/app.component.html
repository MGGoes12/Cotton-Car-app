<div class="app-shell">
  <div *ngIf="supabase.configMissing" class="config-error">
    ⚠ Supabase is not configured. Set <strong>SUPABASE_URL</strong> and <strong>SUPABASE_PUBLISHABLE_KEY</strong> in your environment variables and redeploy.
  </div>
  <header>
    <div>
      <h1>Cotton Car Booking</h1>
      <p class="small-text">Mobile-first family booking for the car</p>
    </div>
    <nav>
      <span *ngIf="user" class="user-email">{{ user.email }}</span>
      <a routerLink="/overview" class="secondary">Overview</a>
      <a routerLink="/booking" class="secondary">Booking</a>
      <button *ngIf="installAvailable" type="button" class="primary" (click)="installApp()">Install App</button>
      <button *ngIf="user" type="button" class="secondary" (click)="logout()">Logout</button>
    </nav>
  </header>

  <main>
    <router-outlet></router-outlet>
  </main>
</div>
